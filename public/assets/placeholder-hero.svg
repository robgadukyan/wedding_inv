<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Hero placeholder</title>
  <desc id="desc">Soft floral-toned background used when hero image is missing.</desc>
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#d8c5b3" />
      <stop offset="100%" stop-color="#8e7a69" />
    </linearGradient>
    <radialGradient id="r1" cx="22%" cy="18%" r="38%">
      <stop offset="0%" stop-color="#f6e9dd" stop-opacity="0.42" />
      <stop offset="100%" stop-color="#f6e9dd" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="r2" cx="78%" cy="72%" r="42%">
      <stop offset="0%" stop-color="#5a4a3e" stop-opacity="0.24" />
      <stop offset="100%" stop-color="#5a4a3e" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#g)" />
  <rect width="1600" height="900" fill="url(#r1)" />
  <rect width="1600" height="900" fill="url(#r2)" />
</svg>
